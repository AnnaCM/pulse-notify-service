openapi: 3.0.3
info:
  title: Notification Service API
  description: Simple notification processing system with batching, queueing, and metrics.
  version: 1.0.0

servers:
  - url: http://localhost:8000

paths:

  /api/health-check:
    get:
      summary: Health check
      description: Checks DB, Redis, and queue status.
      responses:
        "200":
          description: System health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: string
                  db:
                    type: boolean
                  redis:
                    type: boolean
                  queue:
                    type: object
                  timestamp:
                    type: string

  /api/metrics:
    get:
      summary: System metrics
      description: Returns queue depth and notification statistics.
      responses:
        "200":
          description: Metrics response
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: object
                    properties:
                      healthy:
                        type: boolean
                    additionalProperties:
                      type: integer
                  notifications:
                    type: object
                    properties:
                      healthy:
                        type: boolean
                      total:
                        type: integer
                      pending:
                        type: integer
                      processing:
                        type: integer
                      sent:
                        type: integer
                      failed:
                        type: integer
                      cancelled:
                        type: integer
                      success_rate:
                        type: number
                      completion_rate:
                        type: number

  /api/notifications:
    post:
      summary: Create notification
      description: Creates a single notification and queues it for processing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, recipient, content]
              properties:
                channel:
                  type: string
                  enum: [email, sms, push]
                  example: email
                recipient:
                  type: string
                  example: user@example.com
                content:
                  type: string
                  maxLength: 1000
                  example: Hello world
                priority:
                  type: string
                  enum: [high, normal, low]
                  default: normal
                  example: high
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResource'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    get:
      summary: List notifications
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, processing, sent, failed, cancelled]
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [email, sms, push]
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-01-01T00:00:00Z"
          description: Start date (inclusive)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-01-02T00:00:00Z"
          description: End date (must be greater than or equal to "from")
        - name: perPage
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCollection'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/notifications/{id}:
    get:
      summary: Get notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResource'
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/notifications/{id}/cancel:
    post:
      summary: Cancel notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification cancelled
        "400":
          description: Cannot cancel notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/notifications/batch:
    post:
      summary: Create batch notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notifications]
              properties:
                priority:
                  type: string
                  enum: [high, normal, low]
                notifications:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: object
                    required: [channel, recipient, content]
                    properties:
                      channel:
                        type: string
                        enum: [email, sms, push]
                      recipient:
                        type: string
                      content:
                        type: string
                        maxLength: 1000
                      priority:
                        type: string
                        enum: [high, normal, low]
      responses:
        "201":
          description: Batch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                  queued:
                    type: integer
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/notifications/batch/{batchId}:
    get:
      summary: Get batch notifications
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Batch notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCollection'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  
  /api/notifications/batch/{batchId}/cancel:
    post:
      summary: Cancel batch notifications
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Batch cancelled
        "400":
          description: No pending notifications found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestResponse'
        "404":
          description: Batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

components:
  schemas:

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batch_id:
          type: string
          format: uuid
          nullable: true
        channel:
          type: string
          enum: [email, sms, push]
        recipient:
          type: string
        status:
          type: string
          enum: [pending, processing, sent, failed, cancelled]
        content:
          type: string
        scheduled_at:
          type: string
          format: date-time
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-tim

    NotificationResource:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Notification'
    
    NotificationCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        next_cursor:
          type: string
          nullable: true
        meta:
          type: object
          nullable: true

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    NotFoundResponse:
      type: object
      properties:
        message:
          type: string
          example: Notification not found

    BadRequestResponse:
      type: object
      properties:
        message:
          type: string
          example: Cannot cancel notification
